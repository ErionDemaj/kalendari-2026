<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalendar 2026</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
    }

    #statusMessage {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
    }

    .hidden {
      display: none !important;
    }

    .year-calendar {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }

    .month {
      background: white;
      padding: 12px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .month h2 {
      text-align: center;
      margin-top: 0;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
    }

    .day {
      height: 40px;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }

    .free {
      background: green;
    }

    .busy {
      background: red;
    }

    .empty {
      height: 40px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 9999;
    }

    .modal-box {
      background: white;
      width: 100%;
      max-width: 520px;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      box-sizing: border-box;
    }

    .modal-box h3 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 22px;
    }

    #noteInput,
    #passwordInput {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 10px;
      box-sizing: border-box;
    }

    #noteInput {
      min-height: 140px;
      resize: vertical;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .modal-buttons button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
    }

    .busy-btn {
      background: red;
      color: white;
    }

    .free-btn {
      background: green;
      color: white;
    }

    .close-btn {
      background: #ddd;
      color: black;
    }

    .login-btn {
      background: #111;
      color: white;
      width: 100%;
      margin-top: 14px;
    }

    #loginError {
      color: red;
      margin-top: 10px;
      text-align: center;
      font-weight: bold;
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }

      .year-calendar {
        grid-template-columns: 1fr;
      }

      .modal-box {
        max-width: 100%;
        padding: 16px;
        border-radius: 12px;
      }

      #noteInput {
        min-height: 180px;
        font-size: 16px;
      }

      .modal-buttons button {
        width: 100%;
      }
    }
  </style>
</head>
<body>

  <div id="loginScreen" class="modal">
    <div class="modal-box">
      <h3>Hyr në kalendar</h3>
      <input id="passwordInput" type="password" placeholder="Shkruaj password-in" />
      <button id="loginBtn" class="login-btn">Hyr</button>
      <div id="loginError"></div>
    </div>
  </div>

  <div id="appContent" class="hidden">
    <h1>Kalendar 2026</h1>
    <div id="statusMessage">Duke ngarkuar...</div>
    <div id="calendar" class="year-calendar"></div>
  </div>

  <div id="noteModal" class="modal hidden">
    <div class="modal-box">
      <h3 id="modalDateTitle">Shënim</h3>

      <textarea id="noteInput" placeholder="Shkruaj shënimin këtu..."></textarea>

      <div class="modal-buttons">
        <button id="saveBusyBtn" class="busy-btn">Ruaj si e zënë</button>
        <button id="saveFreeBtn" class="free-btn">Ruaj si e lirë</button>
        <button id="closeModalBtn" class="close-btn">Mbyll</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://hlqkxvjonteykjhiddhz.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhscWt4dmpvbnRleWtqaGlkZGh6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzMTI3MTksImV4cCI6MjA5MDg4ODcxOX0.m3yYjUAllhp0t3me9NPBW0pImaDZt3UL-SzcZg2nkCY";
    const APP_PASSWORD = "000000";

    const loginScreen = document.getElementById("loginScreen");
    const appContent = document.getElementById("appContent");
    const passwordInput = document.getElementById("passwordInput");
    const loginBtn = document.getElementById("loginBtn");
    const loginError = document.getElementById("loginError");

    const statusMessage = document.getElementById("statusMessage");
    const calendar = document.getElementById("calendar");

    const noteModal = document.getElementById("noteModal");
    const modalDateTitle = document.getElementById("modalDateTitle");
    const noteInput = document.getElementById("noteInput");
    const saveBusyBtn = document.getElementById("saveBusyBtn");
    const saveFreeBtn = document.getElementById("saveFreeBtn");
    const closeModalBtn = document.getElementById("closeModalBtn");

    let selectedDate = "";

    const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const year = 2026;

    const monthNames = [
      "Janar", "Shkurt", "Mars", "Prill", "Maj", "Qershor",
      "Korrik", "Gusht", "Shtator", "Tetor", "Nëntor", "Dhjetor"
    ];

    const weekDays = ["Hën", "Mar", "Mër", "Enj", "Pre", "Sht", "Die"];

    function formatDate(year, month, day) {
      const m = String(month + 1).padStart(2, "0");
      const d = String(day).padStart(2, "0");
      return `${year}-${m}-${d}`;
    }

    function daysInMonth(year, month) {
      return new Date(year, month + 1, 0).getDate();
    }

    function getMondayFirstDay(jsDay) {
      return jsDay === 0 ? 6 : jsDay - 1;
    }

    function openModal(fullDate, currentNote = "") {
      selectedDate = fullDate;
      modalDateTitle.textContent = `Shënim për ${fullDate}`;
      noteInput.value = currentNote;
      noteModal.classList.remove("hidden");
    }

    function closeModal() {
      noteModal.classList.add("hidden");
      selectedDate = "";
      noteInput.value = "";
    }

    async function saveDateStatus(newStatus) {
      if (!selectedDate) return;

      const note = noteInput.value;

      const { error: saveError } = await client
        .from("dates")
        .upsert(
          {
            date: selectedDate,
            status: newStatus,
            note: note
          },
          { onConflict: "date" }
        );

      if (saveError) {
        alert("Gabim gjatë ruajtjes: " + saveError.message);
        console.error(saveError);
        return;
      }

      closeModal();
      loadCalendar();
    }

    saveBusyBtn.onclick = () => saveDateStatus("busy");
    saveFreeBtn.onclick = () => saveDateStatus("free");
    closeModalBtn.onclick = closeModal;

    noteModal.onclick = (e) => {
      if (e.target === noteModal) {
        closeModal();
      }
    };

    async function loadCalendar() {
      try {
        statusMessage.textContent = "Duke lexuar të dhënat...";

        const { data, error } = await client
          .from("dates")
          .select("*");

        if (error) {
          console.error("Gabim nga Supabase:", error);
          statusMessage.textContent = "Gabim nga Supabase: " + error.message;
          return;
        }

        const rows = Array.isArray(data) ? data : [];

        const dateMap = {};
        rows.forEach(item => {
          dateMap[item.date] = item;
        });

        calendar.innerHTML = "";

        for (let month = 0; month < 12; month++) {
          const monthBox = document.createElement("div");
          monthBox.className = "month";

          const title = document.createElement("h2");
          title.textContent = monthNames[month];
          monthBox.appendChild(title);

          const weekdaysRow = document.createElement("div");
          weekdaysRow.className = "weekdays";

          weekDays.forEach(dayName => {
            const wd = document.createElement("div");
            wd.textContent = dayName;
            weekdaysRow.appendChild(wd);
          });

          monthBox.appendChild(weekdaysRow);

          const daysGrid = document.createElement("div");
          daysGrid.className = "days";

          const firstDay = new Date(year, month, 1).getDay();
          const offset = getMondayFirstDay(firstDay);
          const totalDays = daysInMonth(year, month);

          for (let i = 0; i < offset; i++) {
            const empty = document.createElement("div");
            empty.className = "empty";
            daysGrid.appendChild(empty);
          }

          for (let day = 1; day <= totalDays; day++) {
            const fullDate = formatDate(year, month, day);
            const item = dateMap[fullDate];
            const status = item?.status === "busy" ? "busy" : "free";

            const btn = document.createElement("button");
            btn.className = `day ${status}`;
            btn.textContent = day;
            btn.title = item?.note || "";

            btn.onclick = () => {
              const currentNote = item?.note || "";
              openModal(fullDate, currentNote);
            };

            daysGrid.appendChild(btn);
          }

          monthBox.appendChild(daysGrid);
          calendar.appendChild(monthBox);
        }

        statusMessage.textContent = "Kalendari u ngarkua me sukses.";
      } catch (err) {
        console.error("Gabim në kod:", err);
        statusMessage.textContent = "Gabim në kod: " + err.message;
      }
    }

    function unlockApp() {
      loginScreen.classList.add("hidden");
      appContent.classList.remove("hidden");
      loadCalendar();
    }

    loginBtn.onclick = () => {
      if (passwordInput.value === APP_PASSWORD) {
        loginError.textContent = "";
        unlockApp();
      } else {
        loginError.textContent = "Password gabim.";
      }
    };

    passwordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        loginBtn.click();
      }
    });
  </script>

</body>
</html>
